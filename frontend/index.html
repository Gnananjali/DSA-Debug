<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>DSADebug v2 — Real Code Execution</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --surface3: #2d333b;
      --border: #30363d;
      --border2: #484f58;
      --text: #e6edf3;
      --muted: #8b949e;
      --hint: #484f58;
      --green: #3fb950;
      --green-bg: rgba(63, 185, 80, .12);
      --green-border: rgba(63, 185, 80, .3);
      --red: #f85149;
      --red-bg: rgba(248, 81, 73, .12);
      --red-border: rgba(248, 81, 73, .3);
      --yellow: #d29922;
      --yellow-bg: rgba(210, 153, 34, .12);
      --blue: #58a6ff;
      --blue-bg: rgba(88, 166, 255, .12);
      --purple: #bc8cff;
      --purple-bg: rgba(188, 140, 255, .12);
      --orange: #f0883e;
      --orange-bg: rgba(240, 136, 62, .12);
      --mono: 'Fira Code', monospace;
      --sans: 'DM Sans', sans-serif;
      --r: 6px;
      --r-lg: 10px;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* ── Top bar ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      z-index: 10
    }

    .logo {
      width: 26px;
      height: 26px;
      background: var(--green);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .logo svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: #0d1117;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .brand {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -.3px
    }

    .brand em {
      color: var(--green);
      font-style: normal
    }

    .v-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 99px;
      background: var(--blue-bg);
      color: var(--blue);
      border: 1px solid rgba(88, 166, 255, .3);
      margin-left: 2px
    }

    .topbar-cx {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .cx-chip {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--surface2);
      display: none
    }

    .cx-chip.visible {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .cx-chip .val {
      font-weight: 500
    }

    .cx-chip.time .val {
      color: var(--blue)
    }

    .cx-chip.space .val {
      color: var(--purple)
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ── Sidebar (problem list) ── */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0
    }

    .sidebar-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted)
    }

    .problem-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px
    }

    .prob-item {
      padding: 8px 10px;
      border-radius: var(--r);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: background .12s;
      margin-bottom: 2px
    }

    .prob-item:hover {
      background: var(--surface2)
    }

    .prob-item.active {
      background: var(--surface3);
      border: 1px solid var(--border2)
    }

    .prob-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text)
    }

    .prob-diff {
      font-size: 10px;
      font-weight: 500;
      padding: 1px 6px;
      border-radius: 99px;
      width: fit-content
    }

    .diff-Easy {
      background: var(--green-bg);
      color: var(--green)
    }

    .diff-Medium {
      background: var(--yellow-bg);
      color: var(--yellow)
    }

    .diff-Hard {
      background: var(--red-bg);
      color: var(--red)
    }

    .prob-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 2px
    }

    .prob-tag {
      font-size: 9px;
      color: var(--hint);
      background: var(--surface3);
      padding: 1px 5px;
      border-radius: 3px
    }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 1px;
      padding: 0 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0
    }

    .tab {
      padding: 8px 13px;
      font-size: 11.5px;
      font-family: var(--sans);
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .12s, border-color .12s;
      white-space: nowrap
    }

    .tab.active {
      color: var(--green);
      border-bottom-color: var(--green)
    }

    .tab:hover:not(.active) {
      color: var(--text)
    }

    .tab .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle
    }

    .dot-pass {
      background: var(--green)
    }

    .dot-fail {
      background: var(--red)
    }

    /* ── Split editor / output ── */
    .work-area {
      flex: 1;
      display: flex;
      overflow: hidden
    }

    /* Editor col */
    .editor-col {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      flex-shrink: 0
    }

    .pane-hdr {
      padding: 7px 13px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface)
    }

    .pane-lbl {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--muted)
    }

    select.pill {
      font-family: var(--sans);
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer
    }

    .problem-banner {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 13px;
      flex-shrink: 0;
      display: none
    }

    .problem-banner.visible {
      display: block
    }

    .pb-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px
    }

    .pb-desc {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 6px
    }

    .pb-examples {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .pb-ex {
      font-family: var(--mono);
      font-size: 10.5px;
      background: var(--surface3);
      padding: 5px 8px;
      border-radius: 4px;
      color: var(--muted)
    }

    .pb-constraints {
      margin-top: 6px;
      font-size: 10.5px;
      color: var(--hint)
    }

    textarea.code {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      padding: 12px 14px;
      background: var(--bg);
      border: none;
      resize: none;
      color: var(--text);
      outline: none;
      tab-size: 2
    }

    textarea.code::placeholder {
      color: var(--hint)
    }

    /* Test cases */
    .tests-panel {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      max-height: 180px;
      overflow-y: auto
    }

    .tests-hdr {
      padding: 7px 13px;
      display: flex;
      align-items: center;
      gap: 7px;
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1
    }

    .add-btn {
      margin-left: auto;
      font-size: 10px;
      font-family: var(--sans);
      padding: 3px 8px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: .12s
    }

    .add-btn:hover {
      color: var(--text);
      border-color: var(--border2)
    }

    .tc-grid {
      padding: 7px 13px;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .tc-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 5px;
      align-items: center
    }

    .tc-row input {
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      outline: none;
      width: 100%
    }

    .tc-row input:focus {
      border-color: var(--blue)
    }

    .tc-row input::placeholder {
      color: var(--hint)
    }

    .del {
      width: 20px;
      height: 20px;
      background: transparent;
      border: none;
      color: var(--hint);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      flex-shrink: 0
    }

    .del:hover {
      color: var(--red);
      background: var(--red-bg)
    }

    .col-lbl {
      font-size: 9px;
      color: var(--hint);
      font-family: var(--mono);
      padding: 0 8px
    }

    /* Action bar */
    .action-bar {
      padding: 9px 13px;
      display: flex;
      gap: 7px;
      align-items: center;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0
    }

    .run-btn {
      flex: 1;
      padding: 8px;
      background: var(--green);
      color: #0d1117;
      border: none;
      border-radius: var(--r);
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .12s, transform .1s;
      letter-spacing: .1px
    }

    .run-btn:hover {
      opacity: .88
    }

    .run-btn:active {
      transform: scale(.98)
    }

    .run-btn:disabled {
      opacity: .35;
      cursor: not-allowed
    }

    .clear-btn {
      padding: 8px 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: var(--sans);
      font-size: 11px;
      color: var(--muted);
      cursor: pointer
    }

    .clear-btn:hover {
      color: var(--text)
    }

    .status-msg {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono)
    }

    /* Output col */
    .output-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface)
    }

    /* Tab panels */
    .tab-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden
    }

    .tab-panel.active {
      display: flex
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 13px;
      display: flex;
      flex-direction: column;
      gap: 10px
    }

    /* Empty */
    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--hint);
      text-align: center;
      padding: 30px
    }

    .empty p {
      font-size: 11.5px;
      line-height: 1.6;
      max-width: 180px
    }

    /* Cards */
    .card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden
    }

    .card-hdr {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 7px
    }

    .card-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px
    }

    .card-body {
      padding: 11px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    /* Summary row */
    .summary-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap
    }

    .pill {
      font-size: 10px;
      font-family: var(--mono);
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500
    }

    .pill-pass {
      background: var(--green-bg);
      color: var(--green);
      border: 1px solid var(--green-border)
    }

    .pill-fail {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-border)
    }

    .pill-muted {
      background: var(--surface3);
      color: var(--muted);
      border: 1px solid var(--border)
    }

    /* Test result rows */
    .tc-result {
      border-radius: var(--r);
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 1px
    }

    .tc-result.pass {
      border-color: var(--green-border);
      background: var(--green-bg)
    }

    .tc-result.fail {
      border-color: var(--red-border);
      background: var(--red-bg)
    }

    .tc-result.skip {
      border-color: var(--yellow-bg);
      background: var(--yellow-bg)
    }

    .tcr-hdr {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      cursor: pointer
    }

    .tcr-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0
    }

    .pass .tcr-icon {
      background: var(--green);
      color: #0d1117
    }

    .fail .tcr-icon {
      background: var(--red);
      color: #fff
    }

    .skip .tcr-icon {
      background: var(--yellow);
      color: #0d1117
    }

    .tcr-name {
      font-size: 11.5px;
      font-weight: 500
    }

    .tcr-reason {
      font-size: 10.5px;
      color: var(--red);
      margin-left: 3px
    }

    .tcr-short {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px
    }

    .tcr-body {
      padding: 0 10px 9px;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .kv {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 5px;
      align-items: baseline
    }

    .kv-k {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .4px
    }

    .kv-v {
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 7px;
      border-radius: 3px;
      word-break: break-all
    }

    .kv-input {
      background: var(--surface3);
      color: var(--text)
    }

    .kv-exp {
      background: var(--green-bg);
      color: var(--green)
    }

    .kv-got {
      background: var(--red-bg);
      color: var(--red)
    }

    .kv-got.ok {
      background: var(--green-bg);
      color: var(--green)
    }

    .kv-time {
      background: var(--surface3);
      color: var(--muted)
    }

    /* Trace */
    .trace-lines {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .tl {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 3px;
      background: var(--surface3);
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 7px;
      line-height: 1.5
    }

    .tl.err {
      background: var(--red-bg);
      color: var(--red)
    }

    .tl.ok {
      background: var(--green-bg);
      color: var(--green)
    }

    .tl-n {
      font-size: 9px;
      flex-shrink: 0;
      margin-top: 1px;
      opacity: .6
    }

    /* Edge */
    .edge-item {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      padding: 7px 0;
      border-bottom: 1px solid var(--border)
    }

    .edge-item:last-child {
      border-bottom: none
    }

    .edge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
      margin-top: 5px
    }

    .edge-label {
      font-size: 11.5px;
      font-weight: 500;
      margin-bottom: 2px
    }

    .edge-code {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--yellow);
      margin-bottom: 2px
    }

    .edge-risk {
      font-size: 10.5px;
      color: var(--muted)
    }

    .edge-add-btn {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--surface3);
      border: 1px solid var(--border);
      color: var(--yellow);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
      transition: .12s
    }

    .edge-add-btn:hover {
      background: var(--yellow-bg)
    }

    /* Complexity */
    .cx-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .cx-card {
      background: var(--surface3);
      border-radius: var(--r);
      padding: 10px 11px
    }

    .cx-lbl {
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px
    }

    .cx-val {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 3px
    }

    .cx-val.time-val {
      color: var(--blue)
    }

    .cx-val.space-val {
      color: var(--purple)
    }

    .cx-note {
      font-size: 10.5px;
      color: var(--muted);
      line-height: 1.5
    }

    /* Performance */
    .perf-card {
      border-radius: var(--r);
      padding: 10px 12px;
      border: 1px solid var(--border)
    }

    .perf-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px
    }

    .perf-text {
      font-size: 12px;
      line-height: 1.65;
      color: var(--text)
    }

    .perf-better {
      border-color: var(--blue-border, rgba(88, 166, 255, .3));
      background: var(--blue-bg)
    }

    .perf-optimal {
      border-color: var(--green-border);
      background: var(--green-bg)
    }

    /* Fix hint */
    .fix-hint {
      padding: 10px 12px;
      border-radius: var(--r);
      background: var(--blue-bg);
      border: 1px solid rgba(88, 166, 255, .3);
      font-size: 12px;
      line-height: 1.65;
      color: var(--text)
    }

    /* Spinner */
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      flex-shrink: 0
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      color: var(--muted);
      font-size: 11.5px
    }

    /* cx ref table */
    .cx-ref-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      font-size: 11px
    }

    .cx-ref-row:last-child {
      border-bottom: none
    }

    .cx-ref-cx {
      font-family: var(--mono);
      color: var(--blue);
      min-width: 80px
    }

    .cx-ref-name {
      color: var(--muted);
      min-width: 90px
    }

    .cx-ref-ex {
      color: var(--hint)
    }

    /* Stream cursor */
    .streaming-text {
      white-space: pre-wrap;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.6
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 12px;
      background: var(--green);
      animation: blink .9s step-end infinite;
      vertical-align: text-bottom;
      margin-left: 2px
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <polyline points="16 18 22 12 16 6" />
        <polyline points="8 6 2 12 8 18" />
      </svg>
    </div>
    <div class="brand">DSA<em>Debug</em><span class="v-badge">v2</span></div>
    <div class="topbar-cx">
      <div class="cx-chip time" id="cx-time-chip">Time <span class="val" id="cx-time-val">—</span></div>
      <div class="cx-chip space" id="cx-space-chip">Space <span class="val" id="cx-space-val">—</span></div>
    </div>
  </div>

  <div class="layout">

    <!-- Sidebar: problem list -->
    <div class="sidebar">
      <div class="sidebar-header">Problems</div>
      <div class="problem-list" id="problem-list">
        <div style="padding:20px 10px;font-size:11px;color:var(--hint);text-align:center">Loading...</div>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('results')">Test Results</button>
        <button class="tab" onclick="switchTab('trace')">Step Trace</button>
        <button class="tab" onclick="switchTab('edge')">Edge Cases</button>
        <button class="tab" onclick="switchTab('complexity')">Complexity</button>
        <button class="tab" onclick="switchTab('performance')">Performance</button>
      </div>

      <div class="work-area">

        <!-- Editor column -->
        <div class="editor-col">
          <div class="pane-hdr">
            <span class="pane-lbl">Code</span>
            <select class="pill" id="lang-sel" onchange="onLangChange()">
              <option value="javascript">JavaScript</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="c++">C++</option>
              <option value="typescript">TypeScript</option>
              <option value="go">Go</option>
            </select>
          </div>

          <div class="problem-banner" id="prob-banner">
            <div class="pb-title" id="pb-title"></div>
            <div class="pb-desc" id="pb-desc"></div>
            <div class="pb-examples" id="pb-examples"></div>
            <div class="pb-constraints" id="pb-constraints"></div>
          </div>

          <textarea class="code" id="code-in" spellcheck="false" placeholder="// Paste or write your solution here...
// Select a problem from the sidebar, or write your own code
// and add test cases below.

function twoSum(nums, target) {
    // brute force — try to beat O(n²)
    for (let i = 0; i < nums.length; i++) {
        for (let j = 0; j < nums.length; j++) {
            if (nums[i] + nums[j] === target) return [i, j];
        }
    }
}"></textarea>

          <div class="tests-panel">
            <div class="tests-hdr">
              <span class="pane-lbl">Test Cases</span>
              <button class="add-btn" onclick="addTest()">+ Add</button>
            </div>
            <div style="padding:4px 13px 2px;display:grid;grid-template-columns:1fr 1fr auto;gap:5px">
              <span class="col-lbl">Input</span>
              <span class="col-lbl">Expected Output</span>
              <span style="width:20px"></span>
            </div>
            <div class="tc-grid" id="tc-grid"></div>
          </div>

          <div class="action-bar">
            <button class="clear-btn" onclick="clearAll()">Clear</button>
            <span class="status-msg" id="status-msg"></span>
            <button class="run-btn" id="run-btn" onclick="runAndAnalyze()">▶ Run &amp; Debug</button>
            <button class="run-btn" onclick="fixCode()">✨ Fix Code</button>

            <button class="run-btn" onclick="explainError()">⚠ Explain Error</button>
          </div>
        </div>

        <!-- Output column -->
        <div class="output-col">

          <!-- TAB: Results -->
          <div class="tab-panel active" id="tab-results">
            <div class="scroll" id="results-scroll">
              <div class="empty" id="results-empty">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
                  opacity=".3">
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.35-4.35M11 8v3M11 14h.01" />
                </svg>
                <p>Write your code, add test cases, hit Run.</p>
              </div>
              <div id="results-body" style="display:none;flex-direction:column;gap:8px"></div>
              <div id="analysis-box" style="
  margin-top:10px;
  padding:10px;
  border-left:4px solid #00ffcc;
  background:#1e1e1e;
  border-radius:6px;
  color:#00ffcc;
"></div>
            </div>
          </div>

          <!-- TAB: Trace -->
          <div class="tab-panel" id="tab-trace">
            <div class="scroll" id="trace-scroll">
              <div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1" opacity=".3">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                <p>Run debug to see step-by-step trace.</p>
              </div>
            </div>
          </div>

          <!-- TAB: Edge Cases -->
          <div class="tab-panel" id="tab-edge">
            <div class="scroll" id="edge-scroll">
              <div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1" opacity=".3">
                  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                  <line x1="12" y1="9" x2="12" y2="13" />
                  <line x1="12" y1="17" x2="12.01" y2="17" />
                </svg>
                <p>Run debug to get edge case suggestions.</p>
              </div>
            </div>
          </div>

          <!-- TAB: Complexity -->
          <div class="tab-panel" id="tab-complexity">
            <div class="scroll" id="cx-scroll">
              <div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1" opacity=".3">
                  <line x1="18" y1="20" x2="18" y2="10" />
                  <line x1="12" y1="20" x2="12" y2="4" />
                  <line x1="6" y1="20" x2="6" y2="14" />
                </svg>
                <p>Run debug to see complexity analysis.</p>
              </div>
            </div>
          </div>

          <!-- TAB: Performance -->
          <div class="tab-panel" id="tab-performance">
            <div class="scroll" id="perf-scroll">
              <div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="1" opacity=".3">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
                </svg>
                <p>Run debug to see performance feedback vs optimal.</p>
              </div>
            </div>
          </div>

        </div><!-- /output-col -->
      </div><!-- /work-area -->
    </div><!-- /main -->
  </div><!-- /layout -->

  <script>

    const API = "http://localhost:4000";


    let problems = [];
    let activeProblem = null;
    let lastRunResults = null;


    async function init() {
      try {
        const res = await fetch(`${API}/api/problems`);
        problems = await res.json();
        renderSidebar();
      } catch {
        document.getElementById("problem-list").innerHTML =
          '<div style="padding:12px 10px;font-size:11px;color:var(--red)">Backend offline.<br>Start the server first.</div>';
      }

      [{ input: "[2,7,11,15]\n9", expected: "[0,1]" },
      { input: "[3,2,4]\n6", expected: "[1,2]" },
      { input: "[3,3]\n6", expected: "[0,1]" },
      ].forEach(t => addTest(t.input, t.expected));
    }


    function renderSidebar() {
      document.getElementById("problem-list").innerHTML = problems.map(p => `
    <div class="prob-item" id="prob-${p.id}" onclick="loadProblem('${p.slug}')">
      <div class="prob-title">${esc(p.title)}</div>
      <div class="prob-diff diff-${p.difficulty}">${p.difficulty}</div>
      <div class="prob-tags">${p.tags.map(t => `<span class="prob-tag">${esc(t)}</span>`).join("")}</div>
    </div>`).join("");
    }

    async function loadProblem(slug) {
      try {
        const res = await fetch(`${API}/api/problems/${slug}`);
        const p = await res.json();
        activeProblem = p;

        // Highlight sidebar item
        document.querySelectorAll(".prob-item").forEach(el =>
          el.classList.toggle("active", el.id === `prob-${p.id}`));

        // Show banner
        const banner = document.getElementById("prob-banner");
        banner.classList.add("visible");
        document.getElementById("pb-title").textContent = `${p.title} · ${p.difficulty}`;
        document.getElementById("pb-desc").textContent = p.description;
        document.getElementById("pb-examples").innerHTML = p.examples.slice(0, 2).map(ex =>
          `<div class="pb-ex">Input: ${esc(ex.input)} → Output: ${esc(ex.output)}</div>`).join("");
        document.getElementById("pb-constraints").textContent =
          "Constraints: " + (p.constraints || []).join(" · ");

        // Set starter code
        const lang = document.getElementById("lang-sel").value;
        document.getElementById("code-in").value = p.starter?.[lang] || p.starter?.javascript || "";

        // Load problem test cases
        document.getElementById("tc-grid").innerHTML = "";
        p.test_cases.forEach(t => addTest(t.input, t.expected));
      } catch (e) {
        console.error(e);
      }
    }

    function onLangChange() {
      if (!activeProblem) return;
      const lang = document.getElementById("lang-sel").value;
      if (activeProblem.starter?.[lang]) {
        document.getElementById("code-in").value = activeProblem.starter[lang];
      }
    }

    // ── Tabs ────────────────────────────────────────────────────────
    const TAB_NAMES = ["results", "trace", "edge", "complexity", "performance"];
    function switchTab(name) {
      document.querySelectorAll(".tab").forEach((t, i) =>
        t.classList.toggle("active", TAB_NAMES[i] === name));
      TAB_NAMES.forEach(n => {
        const el = document.getElementById("tab-" + n);
        if (el) el.classList.toggle("active", n === name);
      });
    }

    // ── Test case helpers ───────────────────────────────────────────
    function addTest(inp = "", exp = "") {
      const grid = document.getElementById("tc-grid");
      const row = document.createElement("div");
      row.className = "tc-row";
      row.innerHTML = `
    <input type="text" placeholder="e.g. [1,2,3] 9 or [1,2,3]\n9" value="${esc(inp)}" style="white-space:pre"/>
    <input type="text" placeholder="e.g. [0,1]"         value="${esc(exp)}"/>
    <button class="del" onclick="this.parentElement.remove()">×</button>`;
      grid.appendChild(row);
    }
    function getTests() {
      return Array.from(document.querySelectorAll(".tc-row")).map(r => {
        const ins = r.querySelectorAll("input");

        let input = ins[0].value.trim();


        if (input.includes("]") && !input.includes("\n")) {
          const match = input.match(/^(\[[^\]]+\])\s*(.+)$/);
          if (match) {
            input = match[1] + "\n" + match[2];
          }
        }

        return {
          input,
          expected: ins[1].value.trim()
        };
      }).filter(t => t.input);
    }

    function clearAll() {
      document.getElementById("code-in").value = "";
      document.getElementById("tc-grid").innerHTML = "";
      document.getElementById("results-empty").style.display = "flex";
      document.getElementById("results-body").style.display = "none";
      document.getElementById("results-body").innerHTML = "";
      ["trace-scroll", "edge-scroll", "cx-scroll", "perf-scroll"].forEach(id =>
        resetPanel(id));
      document.getElementById("cx-time-chip").classList.remove("visible");
      document.getElementById("cx-space-chip").classList.remove("visible");
      setStatus("");
      lastRunResults = null;
      activeProblem = null;
      document.getElementById("prob-banner").classList.remove("visible");
      document.querySelectorAll(".prob-item").forEach(el => el.classList.remove("active"));
    }

    function resetPanel(id) {
      const el = document.getElementById(id);
      // Keep only empty state (first child)
      while (el.children.length > 1) el.removeChild(el.lastChild);
      if (el.firstElementChild) el.firstElementChild.style.display = "flex";
    }

    function setStatus(msg) {
      document.getElementById("status-msg").textContent = msg;
    }


    async function runAndAnalyze() {
      const code = document.getElementById("code-in").value.trim();
      const lang = document.getElementById("lang-sel").value;
      const tests = getTests();
      if (!code) return alert("Please write or paste your code.");
      if (!tests.length) return alert("Add at least one test case.");

      const btn = document.getElementById("run-btn");
      btn.disabled = true; btn.textContent = "Running...";

      document.getElementById("results-empty").style.display = "none";
      const rb = document.getElementById("results-body");
      rb.style.display = "flex";
      rb.innerHTML = '<div class="loading-row"><div class="spinner"></div><span>Executing code...</span></div>';


      let runData;
      try {
        setStatus("Executing...");
        const res = await fetch(`${API}/api/run`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ code, language: lang, tests }),
        });
        runData = await res.json();
        if (runData.error) throw new Error(runData.error);
        lastRunResults = runData.results;
        renderTestResults(runData);
      } catch (e) {
        rb.innerHTML = `<div class="card"><div class="card-body"><div style="color:var(--red);font-size:12px">Execution error: ${esc(e.message)}</div></div></div>`;
        btn.disabled = false; btn.textContent = "▶ Run & Debug";
        setStatus("");
        return;
      }


      setStatus("Analyzing...");
      rb.innerHTML += '<div class="loading-row" id="ai-loading"><div class="spinner"></div><span>AI analyzing results...</span></div>';

      try {


        const res = await fetch(`${API}/api/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            code, language: lang, tests,
            run_results: lastRunResults,
            problem_slug: activeProblem?.slug || null,
          }),
        });

        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });

          const lines = buf.split("\n");
          buf = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data:")) continue;
            try {
              const msg = JSON.parse(line.slice(5).trim());
              handleSSE(msg);
            } catch { }
          }
        }
      } catch (e) {
        console.error("Stream error:", e);
      }

      const aiLoading = document.getElementById("ai-loading");
      if (aiLoading) aiLoading.remove();
      btn.disabled = false; btn.textContent = "▶ Run & Debug";
      setStatus("");
    }


    function handleSSE(msg) {
      if (!msg) return;
      const key = Object.keys(msg)[0];

      if (msg.message) setStatus(msg.message);
      if (msg.run_results) { lastRunResults = msg.results; renderTestResults({ results: msg.results, passed: msg.passed, total: msg.total }); }
      if (msg.analysis) renderAnalysis(msg.analysis);
      if (msg.done) setStatus("");
      if (msg.error) setStatus("Error: " + msg.error);
    }


    function renderTestResults(data) {
      const passed = data.passed ?? data.results.filter(r => r.passed).length;
      const total = data.total ?? data.results.length;
      const rb = document.getElementById("results-body");

      const summaryHtml = `
    <div class="card" id="summary-card">
      <div class="card-hdr">
        <span class="card-title" style="color:${passed === total ? 'var(--green)' : 'var(--red)'}">
          ${passed === total ? "✓ All Passing" : "✗ Tests Failing"}
        </span>
        <div class="summary-row" style="margin-left:auto">
          <span class="pill pill-pass">${passed} pass</span>
          <span class="pill pill-fail">${total - passed} fail</span>
          <span class="pill pill-muted">${total} total</span>
        </div>
      </div>
      <div class="card-body" id="tc-results-list">
        ${data.results.map((r, i) => renderTCRow(r, i)).join("")}
      </div>
    </div>`;

      const existing = document.getElementById("summary-card");
      if (existing) existing.outerHTML = summaryHtml;
      else rb.innerHTML = summaryHtml;
    }

    function renderTCRow(r, i) {
      const cls = r.skipped ? "skip" : r.passed ? "pass" : "fail";
      const icon = r.skipped ? "?" : r.passed ? "✓" : "✗";
      const short = String(r.input).replace(/\n/g, ", ").slice(0, 30);
      const timeStr = r.time_ms != null ? `${r.time_ms}ms` : "";

      return `<div class="tc-result ${cls}">
    <div class="tcr-hdr">
      <div class="tcr-icon">${icon}</div>
      <span class="tcr-name">Case ${i + 1}</span>
      ${!r.passed && r.reason ? `<span class="tcr-reason">${esc(r.reason)}</span>` : ""}
      <span class="tcr-short">${esc(short)}</span>
      ${timeStr ? `<span class="pill pill-muted" style="margin-left:4px">${timeStr}</span>` : ""}
    </div>
    <div class="tcr-body">
      <div class="kv"><span class="kv-k">Input</span>    <span class="kv-v kv-input">${esc(String(r.input).replace(/\n/g, " · "))}</span></div>
      <div class="kv"><span class="kv-k">Expected</span> <span class="kv-v kv-exp">${esc(r.expected)}</span></div>
      <div class="kv"><span class="kv-k">Got</span>      <span class="kv-v kv-got ${r.passed ? 'ok' : ''}">${esc(r.actual)}</span></div>
    </div>
  </div>`;
    }


    function renderAnalysis(d) {
      if (!d) return;

      // Complexity topbar chips
      if (d.time_complexity) {
        document.getElementById("cx-time-val").textContent = d.time_complexity;
        document.getElementById("cx-time-chip").classList.add("visible");
      }
      if (d.space_complexity) {
        document.getElementById("cx-space-val").textContent = d.space_complexity;
        document.getElementById("cx-space-chip").classList.add("visible");
      }

      // Fix hint on results tab
      if (d.fix_hint) {
        const rb = document.getElementById("results-body");
        const existing = document.getElementById("fix-hint-card");
        const html = `<div class="fix-hint" id="fix-hint-card"><strong style="color:var(--blue)">Fix Hint: </strong>${esc(d.fix_hint)}</div>`;
        if (existing) existing.outerHTML = html;
        else rb.insertAdjacentHTML("beforeend", html);
      }

      // Trace tab
      if (d.trace?.length) {
        const s = document.getElementById("trace-scroll");
        resetPanel("trace-scroll");
        s.insertAdjacentHTML("beforeend", `
      <div class="card">
        <div class="card-hdr"><span class="card-title" style="color:var(--purple)">Step-by-Step Trace</span></div>
        <div class="card-body">
          <div class="trace-lines">
            ${d.trace.map((l, i) => {
          const err = l.includes("❌") || l.toLowerCase().includes("wrong") || l.toLowerCase().includes("fail");
          const ok = l.includes("✅") || l.includes("✓");
          return `<div class="tl ${err ? 'err' : ok ? 'ok' : ''}"><span class="tl-n">${i + 1}</span>${esc(l.replace(/❌|✅|✓/g, "").trim())}</div>`;
        }).join("")}
          </div>
          ${d.trace_verdict ? `<div style="margin-top:8px;padding:8px 10px;border-radius:var(--r);background:var(--surface3);font-size:11.5px;color:var(--muted);line-height:1.6">${esc(d.trace_verdict)}</div>` : ""}
        </div>
      </div>`);
      }

      // Edge cases tab
      if (d.edge_cases?.length) {
        const s = document.getElementById("edge-scroll");
        resetPanel("edge-scroll");
        s.insertAdjacentHTML("beforeend", `
      <div class="card">
        <div class="card-hdr"><span class="card-title" style="color:var(--yellow)">⚠ Edge Cases to Test</span></div>
        <div class="card-body">
          ${d.edge_cases.map(e => `
            <div class="edge-item">
              <div class="edge-dot"></div>
              <div style="flex:1">
                <div class="edge-label">${esc(e.label)}</div>
                <div class="edge-code">${esc(e.example)}</div>
                <div class="edge-risk">${esc(e.risk)}</div>
              </div>
              <button class="edge-add-btn" onclick="addTest('${esc(e.example).replace(/'/g, "\\'")}','')">+ Test</button>
            </div>`).join("")}
        </div>
      </div>`);
      }

      // Complexity tab
      if (d.time_complexity) {
        const s = document.getElementById("cx-scroll");
        resetPanel("cx-scroll");
        s.insertAdjacentHTML("beforeend", `
      <div class="card">
        <div class="card-hdr"><span class="card-title" style="color:var(--blue)">Complexity Analysis</span></div>
        <div class="card-body">
          <div class="cx-grid">
            <div class="cx-card">
              <div class="cx-lbl">Time Complexity</div>
              <div class="cx-val time-val">${esc(d.time_complexity)}</div>
              <div class="cx-note">${esc(d.time_explain || "")}</div>
            </div>
            <div class="cx-card">
              <div class="cx-lbl">Space Complexity</div>
              <div class="cx-val space-val">${esc(d.space_complexity || "—")}</div>
              <div class="cx-note">${esc(d.space_explain || "")}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-hdr"><span class="card-title" style="color:var(--muted)">Reference Chart</span></div>
        <div class="card-body">
          ${[["O(1)", "Constant", "Array index, hash lookup"],
          ["O(log n)", "Logarithmic", "Binary search"],
          ["O(n)", "Linear", "Single loop"],
          ["O(n log n)", "Linearithmic", "Merge sort"],
          ["O(n²)", "Quadratic", "Nested loops"],
          ["O(2ⁿ)", "Exponential", "Recursive subsets"],
          ].map(([cx, nm, ex]) => `<div class="cx-ref-row"><span class="cx-ref-cx">${cx}</span><span class="cx-ref-name">${nm}</span><span class="cx-ref-ex">${ex}</span></div>`).join("")}
        </div>
      </div>`);
      }

      // Performance tab
      const ps = document.getElementById("perf-scroll");
      resetPanel("perf-scroll");
      const isOptimal = (d.better_approach || "").toLowerCase().includes("optimal");
      ps.insertAdjacentHTML("beforeend", `
    <div class="card">
      <div class="card-hdr"><span class="card-title" style="color:var(--orange)">Performance Feedback</span></div>
      <div class="card-body">
        ${d.performance_vs_optimal ? `
          <div class="perf-card ${isOptimal ? 'perf-optimal' : 'perf-better'}">
            <div class="perf-label" style="color:${isOptimal ? 'var(--green)' : 'var(--orange)'}">
              ${isOptimal ? "✓ Your solution is optimal" : "⚡ A faster approach exists"}
            </div>
            <div class="perf-text">${esc(d.performance_vs_optimal)}</div>
          </div>` : ""}
        ${d.better_approach && !isOptimal ? `
          <div class="perf-card perf-better">
            <div class="perf-label" style="color:var(--blue)">Better Approach</div>
            <div class="perf-text">${esc(d.better_approach)}</div>
          </div>` : ""}
        ${activeProblem?.optimal_complexity ? `
          <div class="perf-card" style="border-color:var(--green-border);background:var(--green-bg)">
            <div class="perf-label" style="color:var(--green)">Optimal Target</div>
            <div class="perf-text" style="font-family:var(--mono);font-size:12px">
              Time: <strong>${activeProblem.optimal_complexity.time}</strong> &nbsp;·&nbsp;
              Space: <strong>${activeProblem.optimal_complexity.space}</strong>
            </div>
          </div>` : ""}
      </div>
    </div>`);
    }

    // ── Utils ────────────────────────────────────────────────────────
    function esc(s) {
      return String(s || "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }


    async function fixCode() {
      const code = document.getElementById("code-in").value;
      const lang = document.getElementById("lang-sel").value;
      const tests = getTests();

      if (!code) return alert("Write code first!");

      setStatus("Fixing code...");

      const res = await fetch(`${API}/api/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          code,
          language: "javascript",
          tests,
          mode: "fix"
        })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let fixedCode = "";
      let fixHint = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const events = buffer.split("\n\n");
        buffer = events.pop();

        for (const evt of events) {
          const dataLine = evt.split("\n").find(l => l.startsWith("data: "));
          if (!dataLine) continue;

          try {
            const data = JSON.parse(dataLine.replace("data: ", ""));

            fixedCode = data.fixed_code || "";
            fixHint = data.explanation || "";
            const explanation = data.explanation || data.fix_hint || "";


            if (explanation) {
              document.getElementById("analysis-box").innerHTML = `
    <div><b>🧠 Explanation</b></div>
    <p style="margin-top:6px;line-height:1.6;">
      ${explanation.replace(/\n/g, "<br>")}
    </p>

    ${fixedCode ? `
      <div style="margin-top:12px;"><b>💡 Fixed Code</b></div>
      <pre style="
        background:#111;
        padding:10px;
        border-radius:6px;
        margin-top:6px;
        overflow:auto;
      "><code>${fixedCode}</code></pre>
    ` : ""}
  `;
            }

          } catch { }
        }
      }



      if (fixedCode) {
        document.getElementById("code-in").value = fixedCode;
      }


      setStatus("");
    }

    async function explainError() {
      const code = document.getElementById("code-in").value;
      const lang = document.getElementById("lang-sel").value;

      if (!code) {
        alert("Write code first!");
        return;
      }

      setStatus("Explaining error...");

      const res = await fetch(`${API}/api/analyze`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          code,
          language: lang,
          tests: []   // no test cases needed
        })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let explanation = "";

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });

        const events = buffer.split("\n\n");
        buffer = events.pop();

        for (const evt of events) {
          if (evt.includes("event: analysis")) {
            const line = evt.split("\n").find(l => l.startsWith("data: "));
            if (!line) continue;

            try {
              const data = JSON.parse(line.replace("data: ", ""));
              explanation = data.explanation || data.fix_hint || "";
            } catch { }
          }
        }
      }

      if (explanation) {
        document.getElementById("analysis-box").innerHTML = `
  <div><b>🧠 Explanation</b></div>
  <p style="margin-top:6px;line-height:1.6;">
    ${explanation.replace(/\n/g, "<br>")}
  </p>
`;
      } else {
        document.getElementById("analysis-box").innerText = "No explanation received.";
      }

      setStatus("");
    }

    init();
  </script>
